name: Recall Watchlist Weekly

on:
  schedule:
    # Mondays at 12:00 UTC (≈ 7am CT standard / 6am CT DST)
    - cron: '0 12 * * 1'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run in dry-run mode (no DB writes)'
        required: false
        default: 'true'
        type: boolean
      limit_mfrs:
        description: 'Only search N manufacturers (testing)'
        required: false
        default: ''
        type: string
      mfr:
        description: 'Substring filter for manufacturer name (testing)'
        required: false
        default: ''
        type: string
      mfr_ids:
        description: 'Comma-separated manufacturer UUIDs (smoke-test)'
        required: false
        default: ''
        type: string
      backfill_since:
        description: 'Optional: ISO date (YYYY-MM-DD) to override the 5-year lookback. Leave blank for normal weekly behavior.'
        required: false
        default: ''
        type: string

jobs:
  # --------------------------------------------------------------------------
  # Job 1: FDA device recall ingest
  # Refreshes public.recalls from openFDA before CourtListener case-matching
  # runs, so any newly registered recalls are already in place for matching.
  #
  # continue-on-error: true — FDA API flakiness must NOT block the downstream
  # litigation-tracking jobs.  A failed FDA ingest is logged and alerted
  # separately; CourtListener and thermometer-score run regardless.
  # --------------------------------------------------------------------------
  openfda-recalls:
    name: FDA device recall ingest
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # FDA API flakiness must not block litigation tracking downstream.
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run openfda_device_recalls
        working-directory: pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          OPENFDA_API_KEY: ${{ secrets.OPENFDA_API_KEY }}
          PIPELINE_TRIGGER: ${{ github.event_name == 'schedule' && 'scheduled' || 'manual' }}
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ -n "${{ inputs.backfill_since }}" ]; then
            ARGS="$ARGS --backfill-since ${{ inputs.backfill_since }}"
          fi
          python -m pipelines.openfda_device_recalls $ARGS

  courtlistener-search:
    name: CourtListener case search
    runs-on: ubuntu-latest
    timeout-minutes: 90
    # Wait for FDA ingest to complete first (fresh recalls in place before
    # case-matching).  continue-on-error on openfda-recalls means this job
    # runs even if the FDA step failed.
    needs: [openfda-recalls]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run courtlistener_recall_cases
        working-directory: pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          COURTLISTENER_API_TOKEN: ${{ secrets.COURTLISTENER_API_TOKEN }}
          PIPELINE_TRIGGER: ${{ github.event_name == 'schedule' && 'scheduled' || 'manual' }}
        run: |
          ARGS=""
          if [ -n "${{ inputs.limit_mfrs }}" ]; then
            ARGS="$ARGS --limit-mfrs ${{ inputs.limit_mfrs }}"
          fi
          if [ -n "${{ inputs.mfr }}" ]; then
            ARGS="$ARGS --mfr \"${{ inputs.mfr }}\""
          fi
          if [ -n "${{ inputs.mfr_ids }}" ]; then
            ARGS="$ARGS --mfr-ids ${{ inputs.mfr_ids }}"
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "Running in DRY-RUN mode"
            python -m pipelines.courtlistener_recall_cases --dry-run $ARGS
          else
            python -m pipelines.courtlistener_recall_cases $ARGS
          fi

  parties-enrichment:
    name: CourtListener /parties/ enrichment
    runs-on: ubuntu-latest
    # Bumped from 60m after an early run cancelled at 730/1000 dockets.
    # With stream-writes, a partial run now persists progress safely.
    timeout-minutes: 240
    needs: courtlistener-search
    # Skip on manual dry-run
    if: ${{ always() && (github.event_name == 'schedule' || inputs.dry_run != 'true') }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run courtlistener_recall_case_parties
        working-directory: pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          COURTLISTENER_API_TOKEN: ${{ secrets.COURTLISTENER_API_TOKEN }}
          PIPELINE_TRIGGER: ${{ github.event_name == 'schedule' && 'scheduled' || 'manual' }}
        run: python -m pipelines.courtlistener_recall_case_parties

  thermometer-score:
    name: Five-Stage Thermometer scoring
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: parties-enrichment
    # Run scoring even if upstream was a no-op, but skip on manual dry-run
    if: ${{ always() && (github.event_name == 'schedule' || inputs.dry_run != 'true') }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run recall_thermometer
        working-directory: pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          PIPELINE_TRIGGER: ${{ github.event_name == 'schedule' && 'scheduled' || 'manual' }}
        run: python -m pipelines.recall_thermometer
