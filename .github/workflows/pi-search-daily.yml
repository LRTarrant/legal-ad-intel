name: PI Search Daily Pipeline

on:
  schedule:
    # Daily at 12:00 UTC
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run in dry-run mode (no DB writes)'
        required: false
        default: 'false'
        type: boolean

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    # ~150 metros x 6 clusters x ~3 keywords x 1.5s delay ~= 2h sequentially.
    # Raised from 45 (sized for the original 3-state, 12-metro seed).
    timeout-minutes: 240

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run pi_search_daily pipeline
        working-directory: pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SEARCHAPI_API_KEY: ${{ secrets.SEARCHAPI_API_KEY }}
          PIPELINE_TRIGGER: ${{ github.event_name == 'schedule' && 'scheduled' || 'manual' }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "Running in DRY-RUN mode"
            python -m pipelines.pi_search_daily --dry-run
          else
            python -m pipelines.pi_search_daily
          fi
