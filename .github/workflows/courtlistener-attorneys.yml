name: CourtListener Attorneys Pipeline

on:
  schedule:
    # Daily at 14:00 UTC (offset from other pipelines)
    - cron: '0 14 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run in dry-run mode (no DB writes)'
        required: false
        default: 'true'
        type: boolean
      mdl_number:
        description: 'Target a single MDL number (optional)'
        required: false
        default: ''
        type: string

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run courtlistener_attorneys pipeline
        working-directory: pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          COURTLISTENER_API_TOKEN: ${{ secrets.COURTLISTENER_API_TOKEN }}
          PIPELINE_TRIGGER: ${{ github.event_name == 'schedule' && 'scheduled' || 'manual' }}
        run: |
          MDL_ARG=""
          if [ -n "${{ inputs.mdl_number }}" ]; then
            MDL_ARG="--mdl ${{ inputs.mdl_number }}"
          fi
          if [ "${{ inputs.dry_run }}" = "true" ] || [ "${{ github.event_name }}" = "schedule" ]; then
            echo "Running in DRY-RUN mode"
            python -m pipelines.courtlistener_attorneys --dry-run $MDL_ARG
          else
            python -m pipelines.courtlistener_attorneys $MDL_ARG
          fi
