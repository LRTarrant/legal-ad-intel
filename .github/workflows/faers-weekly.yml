name: FAERS Weekly

# Phase 3 of the CPSC -> FAERS -> MAUDE data-source arc.
# Pulls openFDA /drug/event.json (serious=1 filter) into drug_adverse_events
# + drug_adverse_event_drugs + drug_adverse_event_reactions + drugs +
# meddra_terms. See docs/data-sources/faers.md and pipelines/faers_weekly.py.
#
# Independent workflow (NOT folded into recall-watchlist-weekly.yml or
# cpsc-recalls-weekly.yml) — different upstream, different failure modes,
# should not block other recall ingest. Time-of-day offset from the recall
# workflows (12:00 / 13:00 UTC) keeps the alerting bands clean.

on:
  schedule:
    # Mondays at 03:00 UTC. openFDA refreshes /drug/event quarterly, so most
    # Monday runs will see ~0 new records; the steady-state rolling window
    # (7 days by default) protects against clock skew + refresh-publication
    # latency without burning rate budget.
    - cron: '0 3 * * 1'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run in dry-run mode (no DB writes)'
        required: false
        default: 'true'
        type: boolean
      backfill_since:
        description: 'Optional: ISO date (YYYY-MM-DD) for receivedate start. Recommended one-shot historical backfill: 2024-01-01 (~1.6M serious records, ~80min with API key). Leave blank for the default 7-day rolling window.'
        required: false
        default: ''
        type: string
      year:
        description: 'Optional: single calendar year backfill by receivedate (e.g. 2024). Overrides backfill_since.'
        required: false
        default: ''
        type: string

jobs:
  faers-weekly:
    name: FAERS adverse event ingest (openFDA /drug/event.json)
    runs-on: ubuntu-latest
    # 240 minutes covers the 2-year backfill scenario (~80min API +
    # publish overhead + safety margin). Steady-state runs finish in
    # ~10min so the wide ceiling is operationally cheap.
    timeout-minutes: 240

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run faers_weekly
        working-directory: pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          # OPENFDA_API_KEY raises the daily quota from 1,000 to 120,000
          # requests. Required for any backfill; the steady-state weekly
          # run is small enough to fit inside the anonymous quota but
          # don't rely on that — set the secret.
          OPENFDA_API_KEY: ${{ secrets.OPENFDA_API_KEY }}
          # OPENFDA_BASE_URL: <override-if-AEMS-migration-cuts-over>
          PIPELINE_TRIGGER: ${{ github.event_name == 'schedule' && 'scheduled' || 'manual' }}
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ -n "${{ inputs.year }}" ]; then
            ARGS="$ARGS --year ${{ inputs.year }}"
          elif [ -n "${{ inputs.backfill_since }}" ]; then
            ARGS="$ARGS --backfill-since ${{ inputs.backfill_since }}"
          fi
          python -m pipelines.faers_weekly $ARGS
