name: JPML Monthly Pipeline

on:
  schedule:
    # 2nd business day of each month — run on the 3rd at 15:00 UTC as buffer
    - cron: '0 15 3 * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run in dry-run mode (no DB writes)'
        required: false
        default: 'false'
        type: boolean
      report_date:
        description: 'Report date YYYY-MM-DD (default: auto-detect from JPML site)'
        required: false
        default: ''
        type: string

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run JPML monthly pipeline
        working-directory: pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          PIPELINE_TRIGGER: ${{ github.event_name == 'schedule' && 'scheduled' || 'manual' }}
        run: |
          DATE_ARG=""
          if [ -n "${{ inputs.report_date }}" ]; then
            DATE_ARG="--date ${{ inputs.report_date }}"
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "Running in DRY-RUN mode"
            python -m pipelines.jpml_monthly --dry-run $DATE_ARG
          else
            python -m pipelines.jpml_monthly $DATE_ARG
          fi
