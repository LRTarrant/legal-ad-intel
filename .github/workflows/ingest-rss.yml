name: Ingest RSS Litigation Developments

on:
  schedule:
    # Daily at 12:00 UTC (7:00 AM CDT / 8:00 AM CDT during DST)
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run in dry-run mode (no DB writes)'
        required: false
        default: 'false'
        type: boolean

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements-rss.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements-rss.txt

      - name: Run RSS ingestion
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python scripts/ingest_rss_developments.py --dry-run
          else
            python scripts/ingest_rss_developments.py
          fi
