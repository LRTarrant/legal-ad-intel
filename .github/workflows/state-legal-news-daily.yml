name: State Legal News Daily Pipeline

on:
  schedule:
    # Daily at 13:00 UTC
    - cron: '0 13 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run in dry-run mode (no DB writes)'
        required: false
        default: 'false'
        type: boolean
      states:
        description: 'Comma-separated state codes to limit (e.g. AL,GA). Blank = all.'
        required: false
        default: ''
        type: string

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run state_legal_news_daily pipeline
        working-directory: pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SEARCHAPI_API_KEY: ${{ secrets.SEARCHAPI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PIPELINE_TRIGGER: ${{ github.event_name == 'schedule' && 'scheduled' || 'manual' }}
          DRY_RUN_INPUT: ${{ inputs.dry_run }}
          STATES_INPUT: ${{ inputs.states }}
        run: |
          ARGS=""
          # Validate STATES_INPUT (comma-separated 2-letter codes) before use.
          if [ -n "$STATES_INPUT" ]; then
            if echo "$STATES_INPUT" | grep -Eq '^[A-Za-z]{2}(,[A-Za-z]{2})*$'; then
              ARGS="$ARGS --states $STATES_INPUT"
            else
              echo "Ignoring malformed states input: $STATES_INPUT"
            fi
          fi
          if [ "$DRY_RUN_INPUT" = "true" ]; then
            echo "Running in DRY-RUN mode"
            python -m pipelines.state_legal_news_daily --dry-run $ARGS
          else
            python -m pipelines.state_legal_news_daily $ARGS
          fi
