name: Google Maps Local Weekly

# Phase 2 of the firm-roster hardening (issue #456, follows PR #455).
# Pulls the Google Maps local pack for PI queries per metro into
# pi_local_businesses, giving get_state_firm_roster a verified-locality source
# (physical in-state address) to drop out-of-state firms that only rank in.
#
# Weekly: firm office locations change slowly, so a daily cadence would burn
# SearchApi budget for near-zero new signal. Tuesday 06:00 UTC keeps it clear of
# the Monday ingest cluster (recall-watchlist 12:00, faers 03:00).

on:
  schedule:
    - cron: '0 6 * * 2'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run in dry-run mode (no DB writes)'
        required: false
        default: 'true'
        type: boolean
      state_filter:
        description: 'Optional: limit to one 2-letter state (e.g. AL). Blank = all metros.'
        required: false
        default: ''
        type: string

jobs:
  google-maps-local-weekly:
    name: Google Maps local-pack firm roster
    runs-on: ubuntu-latest
    # First run geocodes all 155 metros (~3min) then pulls 155 x 2 queries
    # (~10min); steady-state skips geocoding. 60min is ample headroom.
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run google_maps_local_daily
        working-directory: pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SEARCHAPI_API_KEY: ${{ secrets.SEARCHAPI_API_KEY }}
          GMAPS_STATE_FILTER: ${{ inputs.state_filter }}
          DRY_RUN_INPUT: ${{ inputs.dry_run }}
          PIPELINE_TRIGGER: ${{ github.event_name == 'schedule' && 'scheduled' || 'manual' }}
        run: |
          ARGS=""
          if [ "$DRY_RUN_INPUT" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python -m pipelines.google_maps_local_daily $ARGS
