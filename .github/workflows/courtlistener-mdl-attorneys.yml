name: CourtListener MDL Attorneys Pipeline

on:
  workflow_dispatch:
    inputs:
      mdl_number:
        description: 'Target a single MDL number (leave empty for all)'
        required: false
        default: ''
        type: string
      dry_run:
        description: 'Run in dry-run mode (no DB writes)'
        required: false
        default: 'false'
        type: boolean

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run MDL attorneys pipeline
        working-directory: pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          COURTLISTENER_API_TOKEN: ${{ secrets.COURTLISTENER_API_TOKEN }}
          PIPELINE_TRIGGER: manual
        run: |
          MDL_ARG=""
          if [ -n "${{ inputs.mdl_number }}" ]; then
            MDL_ARG="--mdl ${{ inputs.mdl_number }}"
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "Running in DRY-RUN mode"
            python -m pipelines.courtlistener_mdl_attorneys --dry-run $MDL_ARG
          else
            python -m pipelines.courtlistener_mdl_attorneys $MDL_ARG
          fi
